version: '3.8'
services:
  db:
    image: postgres:18.3-alpine3.22
    environment:
      POSTGRES_USER: factory
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: clips_db
    ports:
      - "15432:5432"

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: secretpassword
    ports:
      - "19002:9000"
      - "19003:9001"

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:v1.8.2
    ports:
      - "18000:9000"
    environment:
      - ASR_ENGINE=openai_whisper
      - ASR_MODEL=base
    volumes:
      - .cache/whisper:/root/.cache/whisper

  redis:
    image: redis:8.6.2-alpine3.23
    ports:
      - "16379:6379"

  app:
    build: .
    environment:
      - VIDEO_URL=${VIDEO_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - USE_MOCK=${USE_MOCK}
      - POSTGRES_DSN=${POSTGRES_DSN:-postgres://factory:secretpassword@host.docker.internal:5432/clips_db?sslmode=disable}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-host.docker.internal:9002}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-admin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-secretpassword}
      - MINIO_BUCKET=${MINIO_BUCKET:-clips}
      - WHISPER_URL=${WHISPER_URL:-http://host.docker.internal:18000/v1/audio/transcriptions}
    volumes:
      - ${HOME}/.gemini:/root/.gemini:ro # Mount OAuth credentials as Read-Only
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
      - minio
    ports:
      - "18080:8080"

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:18080}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:18080}
    depends_on:
      - app
    ports:
      - "13100:3000"

  # Optional: Faster-Whisper API (Local STT)
  # whisper:
  #   image: onerahmet/openai-whisper-asr-webservice:v1.8.2
  #   ports:
  #     - "8000:8000"
