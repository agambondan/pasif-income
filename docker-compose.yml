services:
  db:
    image: postgres:18.3-alpine3.22
    environment:
      POSTGRES_USER: factory
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: clips_db
    ports:
      - "15432:5432"

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: secretpassword
    ports:
      - "19002:9000"
      - "19003:9001"
    command: server /data --console-address ":9001"

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:v1.8.2
    ports:
      - "18000:9000"
    environment:
      - ASR_ENGINE=openai_whisper
      - ASR_MODEL=base
    volumes:
      - .cache/whisper:/root/.cache/whisper

  redis:
    image: redis:8.6.2-alpine3.23
    ports:
      - "16379:6379"

  app:
    build: .
    env_file: .env
    environment:
      - VIDEO_URL=${VIDEO_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - POSTGRES_DSN=${POSTGRES_DSN:-postgres://factory:secretpassword@db:5432/clips_db?sslmode=disable}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-admin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-secretpassword}
      - MINIO_BUCKET=${MINIO_BUCKET:-clips}
      - WHISPER_URL=${WHISPER_URL:-http://whisper:9000/v1/audio/transcriptions}
      - BROWSER_PROFILES_DIR=/data/browser_profiles
      - CHROMIUM_PROFILE_DIR=/data/browser_profiles
      - SEED_DEMO_BROWSER_PROFILE=1
      - BROWSER_LAUNCH_REQUEST_DIR=/runtime/browser-launch-requests
    volumes:
      - ${HOME}/.codex:/root/.codex
      - ${HOME}/.gemini:/root/.gemini:ro
      - browser_data:/data/browser_profiles
      - ./.runtime/browser-launch-requests:/runtime/browser-launch-requests
    depends_on:
      - db
      - minio
      - whisper
    ports:
      - "18080:8080"

  browser-launcher:
    build:
      context: .
      dockerfile: Dockerfile.browser-launcher
    env_file: .env
    environment:
      - DISPLAY=
      - XAUTHORITY=${XAUTHORITY}
      - XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR}
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY:-wayland-0}
      - BROWSER_LAUNCH_REQUEST_DIR=/runtime/browser-launch-requests
      - BROWSER_LAUNCH_NO_SANDBOX=1
      - BROWSER_LAUNCH_HEADLESS=0
      - BROWSER_LAUNCH_IGNORE_CERT_ERRORS=1
      - BROWSER_PROFILES_DIR=/data/browser_profiles
      - CHROMIUM_PROFILE_DIR=/data/browser_profiles
    volumes:
      - ./.runtime/browser-launch-requests:/runtime/browser-launch-requests
      - browser_data:/data/browser_profiles
      - ${XDG_RUNTIME_DIR}:${XDG_RUNTIME_DIR}:rw
      - ${XAUTHORITY}:${XAUTHORITY}:ro
    depends_on:
      - app

  clipper:
    build:
      context: .
      dockerfile: Dockerfile.clipper
    env_file: .env
    environment:
      - VIDEO_URL=${VIDEO_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - POSTGRES_DSN=${POSTGRES_DSN:-postgres://factory:secretpassword@db:5432/clips_db?sslmode=disable}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-admin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-secretpassword}
      - MINIO_BUCKET=${MINIO_BUCKET:-clips}
      - WHISPER_URL=${WHISPER_URL:-http://whisper:9000/v1/audio/transcriptions}
      - CLIPPER_PORT=${CLIPPER_PORT:-8081}
      - BROWSER_PROFILES_DIR=/data/browser_profiles
      - CHROMIUM_PROFILE_DIR=/data/browser_profiles
    volumes:
      - ${HOME}/.codex:/root/.codex
      - ${HOME}/.gemini:/root/.gemini:ro
      - browser_data:/data/browser_profiles
    depends_on:
      - db
      - minio
      - whisper
    ports:
      - "18082:8081"

  creator:
    build:
      context: .
      dockerfile: Dockerfile.creator
    env_file: .env
    volumes:
      - ${HOME}/.codex:/root/.codex
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_ACCESS_TOKEN=${GEMINI_ACCESS_TOKEN}
      - NICHE=${NICHE:-stoicism}
      - TOPIC=${TOPIC:-how to control your mind}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-admin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-secretpassword}
      - MINIO_BUCKET=${MINIO_BUCKET:-clips}
    profiles:
      - manual

  web:
    build:
      context: ./web
      args:
        API_PROXY_TARGET: ${API_PROXY_TARGET:-http://app:8080}
    environment:
      API_PROXY_TARGET: ${API_PROXY_TARGET:-http://app:8080}
    depends_on:
      - app
    ports:
      - "13100:3000"

volumes:
  browser_data:
