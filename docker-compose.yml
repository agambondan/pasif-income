version: '3.8'
services:
  db:
    image: postgres:18.3-alpine3.22
    environment:
      POSTGRES_USER: factory
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: clips_db
    ports:
      - "15432:5432"

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: secretpassword
    ports:
      - "19002:9000"
      - "19003:9001"

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:v1.8.2
    ports:
      - "18000:9000"
    environment:
      - ASR_ENGINE=openai_whisper
      - ASR_MODEL=base
    volumes:
      - .cache/whisper:/root/.cache/whisper

  redis:
    image: redis:8.6.2-alpine3.23
    ports:
      - "16379:6379"

  app:
    build: .
    env_file: .env
    environment:
      - VIDEO_URL=${VIDEO_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - POSTGRES_DSN=${POSTGRES_DSN:-postgres://factory:secretpassword@db:5432/clips_db?sslmode=disable}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-admin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-secretpassword}
      - MINIO_BUCKET=${MINIO_BUCKET:-clips}
      - WHISPER_URL=${WHISPER_URL:-http://whisper:9000/v1/audio/transcriptions}
      - BROWSER_PROFILES_DIR=/data/browser_profiles
    volumes:
      - ${HOME}/.gemini:/root/.gemini:ro # Mount OAuth credentials as Read-Only
      - browser_data:/data/browser_profiles
    depends_on:
      - db
      - minio
      - whisper
    ports:
      - "18080:8080"

  clipper:
    build:
      context: .
      dockerfile: Dockerfile.clipper
    env_file: .env
    environment:
      - VIDEO_URL=${VIDEO_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - POSTGRES_DSN=${POSTGRES_DSN:-postgres://factory:secretpassword@db:5432/clips_db?sslmode=disable}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-admin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-secretpassword}
      - MINIO_BUCKET=${MINIO_BUCKET:-clips}
      - WHISPER_URL=${WHISPER_URL:-http://whisper:9000/v1/audio/transcriptions}
      - CLIPPER_PORT=${CLIPPER_PORT:-8081}
    depends_on:
      - db
      - minio
      - whisper
    ports:
      - "18082:8081"

  creator:
    build:
      context: .
      dockerfile: Dockerfile.creator
    env_file: .env
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_ACCESS_TOKEN=${GEMINI_ACCESS_TOKEN}
      - NICHE=${NICHE:-stoicism}
      - TOPIC=${TOPIC:-how to control your mind}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-admin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-secretpassword}
      - MINIO_BUCKET=${MINIO_BUCKET:-clips}
    profiles:
      - manual

  web:
    build:
      context: ./web
      args:
        API_PROXY_TARGET: ${API_PROXY_TARGET:-http://app:8080}
    environment:
      API_PROXY_TARGET: ${API_PROXY_TARGET:-http://app:8080}
    depends_on:
      - app
    ports:
      - "13100:3000"

  # Optional: Faster-Whisper API (Local STT)
  # whisper:
  #   image: onerahmet/openai-whisper-asr-webservice:v1.8.2
  #   ports:
  #     - "8000:8000"

volumes:
  browser_data:
